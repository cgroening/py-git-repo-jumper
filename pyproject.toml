[project]
name = "git-repo-jumper"
version = "0.1.0"
dependencies = [
    "InquirerPy>=0.3.4",
    "PyYAML>=6.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
]

[tool.pyright]
exclude = [
    "**/__pycache__",
    "**/*.pyc",
    ".venv",
    "venv",
    "**/node_modules",
]

[project.scripts]
taskcli = "gjump.main:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
check_untyped_defs = true
